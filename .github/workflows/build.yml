name: Build Geode Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android Mod
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install Geode CLI
        run: |
          wget https://github.com
          unzip geode-cli-v3.7.4-linux.zip -d geode-cli-dir
          echo "$(pwd)/geode-cli-dir" >> $GITHUB_PATH

      - name: Configure CMake & Build Mod
        run: |
          geode profile add --name ActionsProfile
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DGEODE_TARGET_PLATFORM=Android
          cmake --build build --config Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geode-mod-android
          path: build/*.geode
          
